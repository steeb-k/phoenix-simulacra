# Tier-1 Windows targets: same workspace, same features, no arch-specific code paths.
name: Windows

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            msvc_arch: amd64
            run_tests: true
          - target: aarch64-pc-windows-msvc
            msvc_arch: arm64
            run_tests: false

    steps:
      - uses: actions/checkout@v4

      - name: MSVC environment (${{ matrix.msvc_arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      # The GUI/CLI build the winfsp feature by default; its bindgen step reads
      # the WinFsp SDK headers from the install dir (registry InstallDir) and
      # uses the runner's preinstalled LLVM for libclang.
      - name: Install WinFsp (SDK for the winfsp feature)
        run: choco install winfsp -y

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        if: matrix.run_tests
        run: cargo fmt --all --check

      # Clippy runs for visibility but does not gate the build: the tree still
      # carries some pre-existing style/dead-code warnings (e.g. GUI stub
      # scaffolding for the not-yet-built pages). We deny the correctness-
      # oriented lint groups only, so a real bug-shaped lint fails CI while
      # style nits don't. Tighten to `-D warnings` once the tree is clean.
      - name: cargo clippy
        if: matrix.run_tests
        run: >
          cargo clippy --workspace --target ${{ matrix.target }}
          -- -D clippy::correctness -D clippy::suspicious

      - name: cargo build --release
        run: cargo build --release --workspace --target ${{ matrix.target }}

      # Tier-1 unit tests: pure logic, no admin, no devices. Engine crates
      # only. (phoenix-gui's test binary inherits a requireAdministrator
      # manifest and phoenix-systests tests are #[ignore]d — both run in the
      # elevated system-tests job.)
      - name: cargo test (unit tier)
        if: matrix.run_tests
        run: >
          cargo test --target ${{ matrix.target }}
          -p phoenix-core -p phoenix-capture -p phoenix-restore -p phoenix-vss

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: carbon-phoenix-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/carbon-phoenix.exe
            target/${{ matrix.target }}/release/carbon-phoenix-gui.exe

  # Tier-2 system tests: real VHDX attach via diskpart + raw disk I/O. GitHub's
  # windows-latest runners execute with an elevated admin token, so diskpart
  # and physical-disk handles work without an interactive UAC prompt. Kept as
  # continue-on-error until proven stable in CI; the local elevated box
  # (scripts/run-system-tests.ps1) is the authoritative gate.
  system-tests:
    name: system-tests (x64, elevated)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
      - name: Install WinFsp (SDK for the winfsp feature)
        run: choco install winfsp -y
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (system tier, single-threaded)
        run: cargo test -p phoenix-systests --features winfsp -- --ignored --test-threads=1
      - name: cargo test (gui, elevated)
        run: cargo test -p phoenix-gui

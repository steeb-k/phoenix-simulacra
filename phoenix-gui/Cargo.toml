[package]
name = "phoenix-gui"
description = "Carbon Phoenix GUI"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[[bin]]
name = "carbon-phoenix-gui"
path = "src/main.rs"

[dependencies]
phoenix-core.workspace = true
phoenix-capture.workspace = true
phoenix-vss.workspace = true
phoenix-restore.workspace = true
eframe = { version = "0.29", default-features = false, features = ["glow"] }
egui = "0.29"
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
rfd.workspace = true
egui_extras = { version = "0.29", features = ["image"] }
image = { version = "0.25", default-features = false, features = ["png"] }
egui-phosphor = "0.7"

[target.'cfg(target_os = "windows")'.dependencies]
winreg = "0.52"

[build-dependencies]
winres.workspace = true
